name: docscan
description: Production-quality mobile document scanner app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5+9
  google_mlkit_document_scanner: ^0.1.0
  image: ^4.1.7
  pdf: ^3.10.8
  printing: ^5.12.0
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  path: ^1.9.0
  shared_preferences: ^2.5.3
  share_plus: ^12.0.1
  file_picker: ^10.3.3
  open_file: ^3.3.2
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  provider: ^6.1.2
  uuid: ^4.3.3
  intl: ^0.19.0
  logger: ^2.3.0
  image_picker: ^1.2.0
  flutter_animate: ^4.5.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
 
